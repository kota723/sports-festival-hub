<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>新種目投票 - SPORTS FESTIVAL 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'sf-blue': '#0047AB',
                        'sf-red': '#DC143C',
                        'sf-dark': '#000B18',
                    },
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans JP', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-slate-50 text-slate-900 font-sans antialiased min-h-screen relative flex flex-col">

    <!-- Header -->
    <header class="glass fixed top-0 w-full z-50 border-b border-white/50 backdrop-blur-xl bg-white/80">
        <div
            class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-14 md:h-16 flex items-center justify-between gap-2 overflow-hidden">
            <div class="flex items-center gap-1 md:gap-4 shrink-0">
                <a href="index.html"
                    class="bg-slate-800 text-white hover:bg-slate-700 transition px-2 py-1.5 md:px-4 md:py-2 rounded-full font-black text-[10px] md:text-sm border-[1.5px] border-slate-900 flex items-center gap-1 md:gap-2 whitespace-nowrap">
                    <svg class="w-3 h-3 md:w-4 md:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7">
                        </path>
                    </svg>
                    <span class="hidden sm:inline">HOMEへ戻る</span><span class="sm:hidden">HOME</span>
                </a>
            </div>
            <div class="flex-shrink-0 flex items-center gap-1 md:gap-4 ml-auto">
                <!-- User Email Display -->
                <span
                    class="user-email-display hidden text-[9px] md:text-sm font-bold text-slate-500 bg-slate-200/50 py-1 px-1.5 md:py-1.5 md:px-3 rounded-full border border-slate-300 max-w-[80px] md:max-w-xs truncate tracking-tighter"></span>
                <h1
                    class="text-xs md:text-xl font-black tracking-wider text-sf-red drop-shadow-sm uppercase hidden sm:block truncate ml-1 md:ml-2">
                    VOTING LIST</h1>
                <!-- Sign Out Button -->
                <button id="btn-logout" onclick="globalMockLogout()"
                    class="hidden bg-slate-800 hover:bg-slate-900 text-white font-black py-1.5 px-3 md:py-2 md:px-6 rounded-full shadow-[2px_2px_0_#1e293b] md:shadow-[4px_4px_0_#1e293b] hover:-translate-y-1 active:translate-y-0 active:shadow-[1px_1px_0_#1e293b] transition-all duration-200 text-[10px] md:text-base whitespace-nowrap">
                    <span class="hidden md:inline">サインアウト </span>👋
                </button>
            </div>
        </div>
    </header>

    <main id="app-view" class="hidden flex-grow pt-20 md:pt-28 pb-12 px-4 sm:px-6 lg:px-8 max-w-4xl mx-auto w-full">

        <!-- INITIAL LIST VIEW -->
        <div id="polls-list-view">
            <div class="text-center mb-8 md:mb-10">
                <h2
                    class="text-base md:text-xl font-black text-slate-800 bg-yellow-300 inline-block px-4 py-2 md:px-6 md:py-2 rounded-full border-2 border-slate-800 shadow-[4px_4px_0_#1e293b] mb-4">
                    現在受付中の投票</h2>
                <p class="text-sm md:text-base text-slate-600 font-bold">1人1票のみ。参加してスポフェスを作り上げよう！</p>
            </div>

            <div id="observer-actions" class="mb-6 flex justify-end hidden">
                <button onclick="window.showCreateForm()"
                    class="bg-sf-blue hover:bg-blue-800 text-white font-black py-3 px-6 rounded-full border-4 border-slate-800 shadow-[4px_4px_0_#1e293b] transform transition hover:-translate-y-1 active:translate-y-0 active:shadow-none flex items-center gap-2 text-sm md:text-base">
                    ➕ 新規の投票を作成する (オブザーバー限定)
                </button>
            </div>

            <div class="space-y-10 md:space-y-12">
                <div>
                    <h3 class="text-xl md:text-2xl font-black mb-4 border-b-4 border-slate-800 pb-2 inline-block">未投票 /
                        開催中 🗳️</h3>
                    <div id="active-polls-container" class="space-y-4">
                        <!-- Populated via JS -->
                    </div>
                </div>

                <div>
                    <h3
                        class="text-xl md:text-2xl font-black mb-4 border-b-4 border-slate-800 pb-2 inline-block text-slate-400">
                        投票済み / 終了 🏁</h3>
                    <div id="voted-polls-container" class="space-y-4 opacity-75">
                        <!-- Populated via JS -->
                    </div>
                </div>
            </div>
        </div>

        <!-- POLL DETAIL VIEW -->
        <div id="poll-detail-view" class="hidden">
            <button onclick="window.showPollList()"
                class="bg-slate-200 hover:bg-slate-300 text-slate-800 font-bold py-2 px-6 rounded-full border-2 border-slate-800 shadow-[4px_4px_0_#1e293b] mb-6 md:mb-8 transform transition hover:-translate-y-1 active:translate-y-0 active:shadow-none inline-flex items-center gap-2 text-sm md:text-base">
                🔙 一覧に戻る
            </button>

            <div id="poll-detail-content" class="animate-[fadeIn_0.3s_ease-out]">
                <!-- Populated via JS -->
            </div>
        </div>

        <!-- CREATE POLL VIEW (OBSERVER ONLY) -->
        <div id="poll-create-view" class="hidden">
            <button onclick="window.showPollList()"
                class="bg-slate-200 hover:bg-slate-300 text-slate-800 font-bold py-2 px-6 rounded-full border-2 border-slate-800 shadow-[4px_4px_0_#1e293b] mb-6 md:mb-8 transform transition hover:-translate-y-1 active:translate-y-0 active:shadow-none inline-flex items-center gap-2 text-sm md:text-base">
                🔙 一覧に戻る
            </button>

            <div
                class="bg-white p-6 md:p-8 border-4 border-slate-800 rounded-3xl shadow-[6px_6px_0_#1e293b] md:shadow-[8px_8px_0_#1e293b]">
                <h3 class="text-xl md:text-2xl font-black mb-6 border-b-2 border-slate-200 pb-4">新規の投票を作成</h3>

                <div class="space-y-6">
                    <div>
                        <label class="block font-bold text-slate-700 mb-2">タイトル</label>
                        <input type="text" id="create-title"
                            class="w-full bg-slate-50 border-2 border-slate-400 rounded-xl p-3 font-bold focus:border-sf-blue focus:ring-0 outline-none text-sm md:text-base"
                            placeholder="例: ラスト1種目はみんなの投票で決定！">
                    </div>
                    <div>
                        <label class="block font-bold text-slate-700 mb-2">説明</label>
                        <textarea id="create-desc"
                            class="w-full bg-slate-50 border-2 border-slate-400 rounded-xl p-3 font-bold focus:border-sf-blue focus:ring-0 outline-none h-24 text-sm md:text-base"
                            placeholder="例: 1人1票まで！間違えないように選んでね🙌"></textarea>
                    </div>
                    <div>
                        <label class="block font-bold text-slate-700 mb-2">期限日時</label>
                        <input type="datetime-local" id="create-deadline"
                            class="w-full bg-slate-50 border-2 border-slate-400 rounded-xl p-3 font-bold focus:border-sf-blue focus:ring-0 outline-none text-sm md:text-base">
                    </div>

                    <div id="create-options-container" class="space-y-3">
                        <label class="block font-bold text-slate-700 mb-2">選択肢 (最低2つ)</label>
                        <input type="text"
                            class="create-option-input w-full bg-slate-50 border-2 border-slate-400 rounded-xl p-3 font-bold text-sm md:text-base"
                            placeholder="選択肢 1">
                        <input type="text"
                            class="create-option-input w-full bg-slate-50 border-2 border-slate-400 rounded-xl p-3 font-bold text-sm md:text-base"
                            placeholder="選択肢 2">
                    </div>
                    <button onclick="window.addOptionField()"
                        class="text-sf-blue font-bold text-sm bg-blue-50 py-2 px-4 rounded-full border border-blue-200 hover:bg-blue-100">+
                        選択肢を追加</button>

                    <div class="pt-6">
                        <button onclick="window.submitNewPoll()"
                            class="w-full bg-sf-red hover:bg-red-700 text-white font-black py-4 px-4 rounded-xl text-center border-b-4 border-red-900 active:border-b-0 active:translate-y-1 transform transition duration-150 text-base md:text-lg">
                            この内容で投票をスタートする 🚀
                        </button>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <footer
        class="border-t border-slate-300 bg-slate-50 py-6 md:py-8 text-center text-xs md:text-sm text-slate-500 w-full mt-auto">
        <p>&copy; 2026 スポーツフェスティバル実行委員会</p>
        <p class="mt-1 md:mt-2 scale-90 md:scale-100">※学内限定公開です。外部共有を禁じます。</p>
    </footer>

    <script type="module" src="js/main.js?v=firebase"></script>
    <script type="module" src="js/vote.js?v=firebase"></script>

</body>

</html>
